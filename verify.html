<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify OTP - NextStep Care</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f0f9ff; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 1.2rem; text-align: center; letter-spacing: 10px; }
        button { width: 100%; padding: 15px; background: #1e3c72; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Enter Verification Code</h2>
        <p>We sent a 6-digit code to your email.</p>
        <input type="text" id="otpCode" placeholder="000000" maxlength="6">
        <button onclick="verifyAccount()">Verify & Register</button>
    </div>

   <script>
    async function verifyAccount() {
        try {
            // 1. Grab the email saved during registration
            const email = localStorage.getItem('emailToVerify');
            
            // SAFETY CHECK: Did the user lose their session?
            if (!email) {
                alert("⚠️ Error: Email session lost. Please try registering again.");
                window.location.href = 'register.html';
                return;
            }

            // 2. Grab the OTP typed by the user
            const otp = document.getElementById('otpCode').value;

            // SAFETY CHECK: Is the box empty?
            if (!otp) {
                alert("⚠️ Please enter the 6-digit code.");
                return;
            }

            // 3. Send to backend
            const response = await fetch('/api/auth/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, otp })
            });

            // 4. Read the response
            const data = await response.json();

            if (response.ok) {
                alert(`✅ Account Verified! Welcome to NextStep-Care.`);
                // Clean up the storage so it doesn't get stuck
                localStorage.removeItem('emailToVerify'); 
                window.location.href = 'login.html';
            } else {
                alert(`❌ Verification Failed: ${data.message || "Invalid OTP"}`);
            }
            
        } catch (err) {
            // This catches major crashes (like the server being offline)
            console.error("Verification Error:", err);
            alert("❌ Server error. Please check your internet connection or the developer console.");
        }
    }
</script>
</body>
</html>
