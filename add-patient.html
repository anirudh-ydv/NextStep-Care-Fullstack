<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Patient - NextStep Care</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="container">
        <h2>🏥 Add New Patient Record</h2>
        <form id="addPatientForm">
            <div class="grid-container">
                <div class="form-group">
                    <label>Patient Name</label>
                    <input type="text" id="patientName" required>
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="age" required>
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select id="gender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Primary Disease</label>
                    <select id="disease">
                        <option value="Anemia">Anemia</option>
                        <option value="Diabetes">Diabetes</option>
                        <option value="Hypertension">Hypertension</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Current BP</label>
                    <input type="text" id="bp">
                </div>
                <div class="form-group">
                    <label>Blood Sugar</label>
                    <input type="text" id="sugar">
                </div>
                <div class="form-group">
                    <label>Hemoglobin</label>
                    <input type="text" id="hemoglobin">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option value="Stable">Stable</option>
                        <option value="Critical">Critical</option>
                    </select>
                </div>
            </div>

            <h3>💊 Prescriptions</h3>
            <div id="prescriptionsContainer">
                <div class="prescription-row">
                    <input type="text" class="med-name" placeholder="Medicine">
                    <input type="text" class="med-dose" placeholder="Dose">
                    <input type="time" class="med-time">
                </div>
            </div>
            <button type="button" onclick="addMedicineRow()">+ Add Medicine</button>

            <div class="form-group" style="margin-top:20px;">
                <label>Next Appointment</label>
                <input type="date" id="nextAppointment">
            </div>

            <button type="submit" class="btn-primary">Save Patient</button>
        </form>
    </div>

    <script>
        function addMedicineRow() {
            const container = document.getElementById('prescriptionsContainer');
            const div = document.createElement('div');
            div.className = 'prescription-row';
            div.innerHTML = `
                <input type="text" class="med-name" placeholder="Medicine">
                <input type="text" class="med-dose" placeholder="Dose">
                <input type="time" class="med-time">
            `;
            container.appendChild(div);
        }

        document.getElementById('addPatientForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Collect prescriptions safely
            const prescriptions = Array.from(document.querySelectorAll('.prescription-row')).map(row => ({
                medicine: row.querySelector('.med-name')?.value || '',
                dosage: row.querySelector('.med-dose')?.value || '',
                time: row.querySelector('.med-time')?.value || ''
            })).filter(p => p.medicine !== '');

            // The "Safety Grab" logic: uses ?.value or empty string if ID is missing
            const patientData = {
                name: document.getElementById('patientName')?.value || 'Unknown',
                age: document.getElementById('age')?.value || 0,
                gender: document.getElementById('gender')?.value || 'Not Specified',
                disease: document.getElementById('disease')?.value || 'None',
                vitals: {
                    bp: document.getElementById('bp')?.value || 'N/A',
                    sugar: document.getElementById('sugar')?.value || 'N/A',
                    hemoglobin: document.getElementById('hemoglobin')?.value || 'N/A'
                },
                status: document.getElementById('status')?.value || 'Stable',
                prescriptions: prescriptions,
                nextAppointment: document.getElementById('nextAppointment')?.value || ''
            };

            try {
                const response = await axios.post('/api/patients/add', patientData);
                alert('✅ Saved!');
                window.location.href = 'doctor-dashboard.html';
            } catch (err) {
                console.error("Save Error:", err);
                alert('❌ Check console for database error.');
            }
        });
    </script>
</body>
</html>
